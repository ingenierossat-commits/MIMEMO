<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIMEMO</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e8dcc8" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0e9d6;
      --bg2:       #e8dcc8;
      --surface:   #faf6ee;
      --border:    #d4c4a0;
      --border2:   #c2b08a;
      --text:      #2c2416;
      --text2:     #6b5c3e;
      --muted:     #9c8a6a;
      --accent:    #c0392b;
      --accent2:   #e74c3c;
      --green:     #27ae60;
      --green2:    #2ecc71;
      --blue:      #2980b9;
      --card-back: #d4a843;
      --card-back2:#e8c060;
      --shadow:    rgba(44,36,22,.15);
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ═══ HEADER ═══ */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Nunito', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -.02em;
    }
    .logo span {
      color: var(--text2);
      font-weight: 400;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ═══ TABS ═══ */
    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 2px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 11px 8px;
      text-align: center;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .2s;
      letter-spacing: .03em;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: var(--surface);
    }

    /* ═══ PAGES ═══ */
    .page { display: none; flex: 1; flex-direction: column; }
    .page.active { display: flex; }

    /* ═══ GAME PAGE ═══ */
    .game-page {
      padding: 16px;
      gap: 14px;
      align-items: center;
    }

    /* Timer display */
    .timer-display {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 600px;
    }
    .timer-clock {
      font-family: 'Nunito', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--text);
      min-width: 90px;
      letter-spacing: .02em;
    }
    .timer-clock.urgent { color: var(--accent); animation: pulse 1s infinite; }
    .timer-clock.infinite { color: var(--text2); font-size: 1.4rem; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    .timer-bar-wrap {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%;
      background: var(--green);
      border-radius: 4px;
      transition: width .5s linear, background .5s;
    }
    .timer-bar.mid    { background: var(--card-back); }
    .timer-bar.urgent { background: var(--accent); }

    .pairs-badge {
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text2);
      white-space: nowrap;
    }
    .pairs-badge .found { color: var(--green); }

    /* ═══ BOARD ═══ */
    .board-wrap {
      width: 100%;
      max-width: 600px;
    }
    .board {
      display: grid;
      gap: 10px;
    }
    /* columnas según nº parejas */
    .board.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .board.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .board.cols-4 { grid-template-columns: repeat(4, 1fr); }

    /* ── CARD ── */
    .card {
      aspect-ratio: 3/4;
      perspective: 900px;
      cursor: pointer;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .5s cubic-bezier(.4,0,.2,1);
      border-radius: var(--radius);
    }
    .card.flipped .card-inner,
    .card.matched .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      backface-visibility: hidden;
      overflow: hidden;
    }

    /* BACK */
    .card-back {
      background: linear-gradient(135deg, var(--card-back), var(--card-back2));
      border: 2px solid #b8882a;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px var(--shadow);
    }
    .card-back-logo {
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      color: rgba(255,255,255,.55);
      letter-spacing: .05em;
      user-select: none;
    }
    .card-back::after {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 9px;
    }

    /* FRONT */
    .card-front {
      background: var(--surface);
      border: 2px solid var(--border);
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      box-shadow: 0 3px 10px var(--shadow);
    }
    .card-front img {
      width: 100%;
      height: 78%;
      object-fit: cover;
      border-radius: 8px;
    }
    .card-label {
      font-size: .72rem;
      font-weight: 700;
      color: var(--text2);
      text-align: center;
      letter-spacing: .03em;
      text-transform: uppercase;
      line-height: 1.1;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* matched */
    .card.matched .card-front {
      border-color: var(--green);
      box-shadow: 0 0 14px rgba(39,174,96,.35);
    }
    .card.no-click { cursor: default; }

    /* PREVIEW overlay */
    .preview-banner {
      display: none;
      width: 100%;
      max-width: 600px;
      background: var(--blue);
      color: #fff;
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .04em;
    }
    .preview-banner.visible { display: block; }

    /* GAME BUTTONS */
    .game-btns {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 600px;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: .04em;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn:active { transform: scale(.97); }
    .btn-play {
      background: var(--accent);
      color: #fff;
      flex: 1;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(192,57,43,.35);
    }
    .btn-play:hover { background: var(--accent2); }
    .btn-stop {
      background: var(--surface);
      color: var(--text2);
      border: 2px solid var(--border2);
      flex: 0 0 auto;
    }
    .btn-stop:hover { border-color: var(--accent); color: var(--accent); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .big { font-size: 3rem; margin-bottom: 10px; }
    .empty-state p { font-size: .9rem; line-height: 1.5; }

    /* ═══════════════════════════════════
       MODAL DE CONFIGURACIÓN DE PARTIDA
    ═══════════════════════════════════ */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,36,22,.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 12px 40px rgba(44,36,22,.25);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .modal-title {
      font-family: 'Nunito', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--accent);
      text-align: center;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-size: .78rem;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    .field select, .field input[type="number"] {
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
    }
    .field select:focus, .field input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .field-hint {
      font-size: .73rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .field-error {
      font-size: .8rem;
      color: var(--accent);
      font-weight: 600;
      display: none;
    }
    .field-error.visible { display: block; }

    .modal-btns {
      display: flex;
      gap: 10px;
    }
    .btn-cancel {
      background: var(--bg2);
      color: var(--text2);
      border: 2px solid var(--border);
      flex: 0 0 auto;
      padding: 12px 18px;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-accept {
      background: var(--green);
      color: #fff;
      flex: 1;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(39,174,96,.3);
    }
    .btn-accept:hover { background: var(--green2); }

    /* RESULTADO */
    .result-modal .modal-title { font-size: 2rem; }
    .result-msg {
      text-align: center;
      font-size: 1rem;
      color: var(--text2);
      line-height: 1.5;
    }
    .result-emoji { font-size: 3rem; text-align: center; }

    /* ═══ CONFIG PAGE ═══ */
    .config-page {
      padding: 16px;
      gap: 16px;
      overflow-y: auto;
    }
    .config-section {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .config-section-title {
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: .02em;
    }

    /* Tema list */
    .tema-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tema-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
    }
    .tema-row.selected { border-color: var(--accent); background: #fdf0ee; }
    .tema-name {
      flex: 1;
      font-weight: 600;
      font-size: .9rem;
    }
    .tema-count {
      font-size: .78rem;
      color: var(--muted);
      font-weight: 500;
    }
    .btn-sm {
      padding: 6px 12px;
      border-radius: 7px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-sm:active { transform: scale(.96); }
    .btn-sm-red    { background: #fde8e8; color: var(--accent); border: 1px solid #f5c6c6; }
    .btn-sm-green  { background: #e8f8ee; color: var(--green);  border: 1px solid #b8e8cc; }
    .btn-sm-blue   { background: #e8f0fb; color: var(--blue);   border: 1px solid #b8d0f0; }

    /* Nuevo tema */
    .new-tema-row {
      display: flex;
      gap: 8px;
    }
    .new-tema-row input {
      flex: 1;
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .9rem;
    }
    .new-tema-row input:focus { outline: none; border-color: var(--accent); }

    /* Imágenes del tema seleccionado */
    .images-section { display: none; }
    .images-section.visible { display: flex; }

    .img-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .img-thumb {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid var(--border);
    }
    .img-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .img-thumb-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(44,36,22,.7);
      color: #fff;
      font-size: .65rem;
      padding: 3px 5px;
      text-align: center;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .img-thumb-del {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--accent);
      color: #fff;
      border: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: .75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      line-height: 1;
    }

    /* Upload area */
    .upload-area {
      border: 2px dashed var(--border2);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      background: var(--bg);
    }
    .upload-area:hover { border-color: var(--accent); background: #fdf0ee; }
    .upload-area p { font-size: .85rem; color: var(--muted); margin-top: 6px; }
    .upload-area .upload-icon { font-size: 1.8rem; }
    #fileInput { display: none; }

    /* Progress */
    .upload-progress {
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .upload-progress.visible { display: flex; }
    .progress-bar-wrap {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--blue);
      border-radius: 3px;
      transition: width .2s;
    }
    .progress-label {
      font-size: .78rem;
      color: var(--text2);
      font-weight: 600;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: var(--surface);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: .85rem;
      font-weight: 600;
      z-index: 500;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error   { background: var(--accent); }

    /* Loading spinner */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 400px) {
      .board.cols-4 { gap: 7px; }
      .card-label { font-size: .62rem; }
      .timer-clock { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="logo">MI<span>MEMO</span></div>
  <div id="headerTheme" style="font-size:.8rem;color:var(--muted);font-weight:600"></div>
</header>

<!-- ═══ TABS ═══ -->
<div class="tabs">
  <div class="tab active" onclick="showTab('game')">🎮 Juego</div>
  <div class="tab" onclick="showTab('config')">⚙️ Configuración</div>
</div>

<!-- ══════════════════════════════════
     PÁGINA: JUEGO
══════════════════════════════════ -->
<div class="page game-page active" id="page-game">

  <!-- Timer -->
  <div class="timer-display" id="timerDisplay" style="display:none">
    <div class="timer-clock" id="timerClock">00:00</div>
    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timerBar"></div>
    </div>
    <div class="pairs-badge"><span class="found" id="pairsFound">0</span> / <span id="pairsTotal">0</span> 🃏</div>
  </div>

  <!-- Preview banner -->
  <div class="preview-banner" id="previewBanner">
    👀 Memoriza las parejas… <span id="previewCountdown"></span>
  </div>

  <!-- Board -->
  <div class="board-wrap">
    <div class="board" id="board">
      <div class="empty-state">
        <div class="big">🃏</div>
        <p>Pulsa <strong>JUGAR</strong> para comenzar<br>una nueva partida</p>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="game-btns">
    <button class="btn btn-play" onclick="openPlayModal()">▶ JUGAR</button>
    <button class="btn btn-stop" onclick="stopGame()">✕ QUITAR</button>
  </div>
</div>

<!-- ══════════════════════════════════
     PÁGINA: CONFIGURACIÓN
══════════════════════════════════ -->
<div class="page config-page" id="page-config">

  <!-- Temas -->
  <div class="config-section">
    <div class="config-section-title">📁 Temas</div>

    <div class="tema-list" id="temaList">
      <div class="spinner"></div>
    </div>

    <div class="new-tema-row">
      <input type="text" id="newTemaInput" placeholder="Nombre del nuevo tema…" maxlength="30" />
      <button class="btn-sm btn-sm-green" onclick="crearTema()">+ Crear</button>
    </div>
  </div>

  <!-- Imágenes del tema seleccionado -->
  <div class="config-section images-section" id="imagesSection">
    <div class="config-section-title">🖼️ Imágenes de: <span id="imageSectionTitle" style="color:var(--accent)"></span></div>

    <div class="img-grid" id="imgGrid"></div>

    <!-- Upload -->
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📤</div>
      <strong>Añadir imágenes</strong>
      <p>Toca para seleccionar fotos desde tu dispositivo</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="uploadImages(this.files)" />

    <div class="upload-progress" id="uploadProgress">
      <div class="progress-label" id="progressLabel">Subiendo…</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     MODAL: CONFIGURAR PARTIDA
══════════════════════════════════ -->
<div class="overlay" id="playOverlay">
  <div class="modal">
    <div class="modal-title">🎮 Nueva partida</div>

    <div class="field">
      <label>Tema</label>
      <select id="modalTema" onchange="onTemaChange()">
        <option value="">— Selecciona un tema —</option>
      </select>
    </div>

    <div class="field">
      <label>Número de parejas</label>
      <select id="modalParejas">
        <option value="2">2 parejas</option>
        <option value="3">3 parejas</option>
        <option value="4">4 parejas</option>
        <option value="5">5 parejas</option>
        <option value="6">6 parejas</option>
        <option value="7">7 parejas</option>
        <option value="8" selected>8 parejas</option>
      </select>
      <div class="field-error" id="parejasError"></div>
      <div class="field-hint" id="parejasHint"></div>
    </div>

    <div class="field">
      <label>Tiempo de vista previa</label>
      <select id="modalPreview">
        <option value="2">2 segundos</option>
        <option value="4" selected>4 segundos</option>
        <option value="6">6 segundos</option>
        <option value="8">8 segundos</option>
        <option value="10">10 segundos</option>
      </select>
    </div>

    <div class="field">
      <label>Tiempo límite</label>
      <select id="modalTiempo">
        <option value="0">Sin límite ∞</option>
        <option value="60">1 minuto</option>
        <option value="120" selected>2 minutos</option>
        <option value="180">3 minutos</option>
        <option value="300">5 minutos</option>
        <option value="600">10 minutos</option>
      </select>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePlayModal()">Cancelar</button>
      <button class="btn btn-accept" onclick="startGame()">✓ ACEPTAR</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     MODAL: RESULTADO
══════════════════════════════════ -->
<div class="overlay" id="resultOverlay">
  <div class="modal result-modal">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="modal-title" id="resultTitle"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="modal-btns" style="margin-top:4px">
      <button class="btn btn-play" style="flex:1;justify-content:center" onclick="closeResult()">▶ JUGAR OTRA VEZ</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════
     FIREBASE + LÓGICA
══════════════════════════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue }
                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase config ──
const firebaseConfig = {
  apiKey:            "AIzaSyChMXx5ZcleAo5oqzPvo1K_Af_wgQkh-LQ",
  authDomain:        "listify-16b5d.firebaseapp.com",
  databaseURL:       "https://listify-16b5d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "listify-16b5d",
  storageBucket:     "listify-16b5d.appspot.com",
  messagingSenderId: "238610923350",
  appId:             "1:238610923350:web:cd5c2c3fb23b5c0afba0f7"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── Estado global ──
let temas         = {};          // { temaId: { nombre, imagenes:{imgId:{nombre,url}} } }
let selectedTema  = null;        // temaId seleccionado en config
let gameConfig    = {            // última configuración de partida
  temaId:    null,
  parejas:   8,
  preview:   4,
  tiempo:    120
};
let gameState = {
  running:   false,
  preview:   false,
  cards:     [],
  flipped:   [],
  matched:   new Set(),
  totalPairs:0,
  timerSecs: 0,
  timerMax:  0,
  interval:  null,
  previewInt:null
};

// ════════════════════════════════
//  TABS
// ════════════════════════════════
window.showTab = (tab) => {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='game') || (i===1 && tab==='config'));
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
};

// ════════════════════════════════
//  FIREBASE: cargar temas
// ════════════════════════════════
const temasRef = ref(db, 'mimemo/temas');
onValue(temasRef, snap => {
  temas = snap.val() || {};
  renderTemaList();
  populateModalTemas();
});

function renderTemaList() {
  const list = document.getElementById('temaList');
  const ids = Object.keys(temas);
  if (!ids.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:.85rem">Aún no hay temas. Crea uno arriba.</p>';
    return;
  }
  list.innerHTML = '';
  ids.forEach(id => {
    const t = temas[id];
    const imgs = t.imagenes ? Object.keys(t.imagenes).length : 0;
    const row = document.createElement('div');
    row.className = 'tema-row' + (selectedTema === id ? ' selected' : '');
    row.innerHTML = `
      <span class="tema-name">${t.nombre}</span>
      <span class="tema-count">${imgs} img</span>
      <button class="btn-sm btn-sm-blue" onclick="selectTema('${id}')">✏️ Imágenes</button>
      <button class="btn-sm btn-sm-red"  onclick="eliminarTema('${id}','${t.nombre}')">🗑️</button>`;
    list.appendChild(row);
  });
}

function populateModalTemas() {
  const sel = document.getElementById('modalTema');
  const current = sel.value;
  sel.innerHTML = '<option value="">— Selecciona un tema —</option>';
  Object.entries(temas).forEach(([id, t]) => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = t.nombre;
    if (id === current || id === gameConfig.temaId) opt.selected = true;
    sel.appendChild(opt);
  });
  onTemaChange();
}

// ── Crear tema ──
window.crearTema = async () => {
  const input = document.getElementById('newTemaInput');
  const nombre = input.value.trim();
  if (!nombre) return;
  const id = 'tema_' + Date.now();
  await set(ref(db, `mimemo/temas/${id}`), { nombre, imagenes: {} });
  input.value = '';
  showToast('Tema "' + nombre + '" creado', 'success');
};

// ── Eliminar tema ──
window.eliminarTema = async (id, nombre) => {
  if (!confirm(`¿Eliminar el tema "${nombre}" y todas sus imágenes?`)) return;
  await remove(ref(db, `mimemo/temas/${id}`));
  if (selectedTema === id) {
    selectedTema = null;
    document.getElementById('imagesSection').classList.remove('visible');
  }
  showToast('Tema eliminado', 'success');
};

// ── Seleccionar tema en config ──
window.selectTema = (id) => {
  selectedTema = id;
  renderTemaList();
  renderImgGrid();
  const section = document.getElementById('imagesSection');
  section.classList.add('visible');
  document.getElementById('imageSectionTitle').textContent = temas[id].nombre;
};

// ── Grid de imágenes ──
function renderImgGrid() {
  const grid = document.getElementById('imgGrid');
  if (!selectedTema) { grid.innerHTML = ''; return; }
  const imgs = temas[selectedTema]?.imagenes || {};
  const entries = Object.entries(imgs);
  if (!entries.length) {
    grid.innerHTML = '<p style="color:var(--muted);font-size:.82rem;grid-column:1/-1">Aún no hay imágenes en este tema.</p>';
    return;
  }
  grid.innerHTML = '';
  entries.forEach(([imgId, img]) => {
    const div = document.createElement('div');
    div.className = 'img-thumb';
    div.innerHTML = `
      <img src="${img.b64}" alt="${img.nombre}" loading="lazy" />
      <div class="img-thumb-name">${img.nombre}</div>
      <button class="img-thumb-del" onclick="eliminarImagen('${imgId}')">✕</button>`;
    grid.appendChild(div);
  });
}

// ── Eliminar imagen ──
window.eliminarImagen = async (imgId) => {
  if (!confirm('¿Eliminar esta imagen?')) return;
  await remove(ref(db, `mimemo/temas/${selectedTema}/imagenes/${imgId}`));
  showToast('Imagen eliminada', 'success');
};

// ── Comprimir imagen a Base64 con canvas ──
function comprimirImagen(file, maxW=300, maxH=400, quality=0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let w = img.width, h = img.height;
        const ratio = Math.min(maxW/w, maxH/h, 1);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Subir imágenes (Base64 en Realtime DB) ──
window.uploadImages = async (files) => {
  if (!selectedTema || !files.length) return;
  const progress = document.getElementById('uploadProgress');
  const bar      = document.getElementById('progressBar');
  const label    = document.getElementById('progressLabel');
  progress.classList.add('visible');

  const arr = Array.from(files);
  for (let i = 0; i < arr.length; i++) {
    const file   = arr[i];
    const nombre = file.name.replace(/\.[^.]+$/, '');
    const imgId  = 'img_' + Date.now() + '_' + i;

    label.textContent = `Procesando ${i+1}/${arr.length}: ${nombre}`;
    bar.style.width = Math.round((i / arr.length) * 100) + '%';

    const b64 = await comprimirImagen(file);
    await set(ref(db, `mimemo/temas/${selectedTema}/imagenes/${imgId}`), { nombre, b64 });
  }

  bar.style.width = '100%';
  setTimeout(() => {
    progress.classList.remove('visible');
    bar.style.width = '0%';
  }, 400);

  document.getElementById('fileInput').value = '';
  showToast(`${arr.length} imagen${arr.length>1?'es':''} añadida${arr.length>1?'s':''}`, 'success');
};

// ════════════════════════════════
//  MODAL JUGAR
// ════════════════════════════════
window.openPlayModal = () => {
  populateModalTemas();
  // restaurar última config
  document.getElementById('modalParejas').value = gameConfig.parejas;
  document.getElementById('modalPreview').value  = gameConfig.preview;
  document.getElementById('modalTiempo').value   = gameConfig.tiempo;
  document.getElementById('playOverlay').classList.add('open');
  onTemaChange();
};
window.closePlayModal = () => {
  document.getElementById('playOverlay').classList.remove('open');
};

window.onTemaChange = () => {
  const temaId = document.getElementById('modalTema').value;
  const hint   = document.getElementById('parejasHint');
  const err    = document.getElementById('parejasError');
  const sel    = document.getElementById('modalParejas');
  err.classList.remove('visible');

  if (!temaId || !temas[temaId]) { hint.textContent = ''; return; }
  const imgs = temas[temaId]?.imagenes ? Object.keys(temas[temaId].imagenes).length : 0;
  const max  = Math.min(imgs, 8);
  hint.textContent = `Este tema tiene ${imgs} imagen${imgs!==1?'es':''} → máximo ${max} pareja${max!==1?'s':''}`;

  // limitar opciones
  Array.from(sel.options).forEach(o => {
    o.disabled = parseInt(o.value) > max;
  });
  if (parseInt(sel.value) > max) sel.value = max;
};

// ════════════════════════════════
//  INICIO DE PARTIDA
// ════════════════════════════════
window.startGame = () => {
  const temaId  = document.getElementById('modalTema').value;
  const parejas = parseInt(document.getElementById('modalParejas').value);
  const preview = parseInt(document.getElementById('modalPreview').value);
  const tiempo  = parseInt(document.getElementById('modalTiempo').value);
  const err     = document.getElementById('parejasError');

  if (!temaId) { showToast('Selecciona un tema primero', 'error'); return; }

  const imgs = temas[temaId]?.imagenes ? Object.values(temas[temaId].imagenes) : [];
  if (imgs.length < parejas) {
    const faltan = parejas - imgs.length;
    err.textContent = `No se pueden mostrar ${parejas} parejas porque faltan ${faltan} imagen${faltan!==1?'es':''}.`;
    err.classList.add('visible');
    return;
  }

  // guardar config
  gameConfig = { temaId, parejas, preview, tiempo };
  closePlayModal();

  // construir mazo
  const shuffled = [...imgs].sort(() => Math.random() - .5).slice(0, parejas);
  const deck = [...shuffled, ...shuffled].sort(() => Math.random() - .5);

  // actualizar header
  document.getElementById('headerTheme').textContent = temas[temaId].nombre;

  // reset estado
  clearInterval(gameState.interval);
  clearInterval(gameState.previewInt);
  gameState = {
    running:    false,
    preview:    true,
    cards:      deck,
    flipped:    [],
    matched:    new Set(),
    totalPairs: parejas,
    timerSecs:  tiempo,
    timerMax:   tiempo,
    interval:   null,
    previewInt: null
  };

  renderBoard(deck, true);

  // columnas según nº cartas totales
  let cols;
  if (parejas <= 3)      cols = 2;
  else if (parejas <= 6) cols = 3;
  else                   cols = 4;
  document.getElementById('board').className = `board cols-${cols}`;

  // mostrar timer
  const timerDisplay = document.getElementById('timerDisplay');
  timerDisplay.style.display = 'flex';
  updateTimerUI();
  updatePairsUI();

  // FASE PREVIEW
  const banner = document.getElementById('previewBanner');
  banner.classList.add('visible');
  let previewLeft = preview;
  document.getElementById('previewCountdown').textContent = previewLeft + 's';

  gameState.previewInt = setInterval(() => {
    previewLeft--;
    document.getElementById('previewCountdown').textContent = previewLeft + 's';
    if (previewLeft <= 0) {
      clearInterval(gameState.previewInt);
      banner.classList.remove('visible');
      flipAllDown();
      gameState.preview = false;
      gameState.running = true;
      if (tiempo > 0) startTimer();
    }
  }, 1000);
};

function renderBoard(deck, faceUp) {
  const board = document.getElementById('board');
  board.innerHTML = '';
  deck.forEach((img, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (faceUp ? ' flipped' : '');
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <span class="card-back-logo">MIMEMO</span>
        </div>
        <div class="card-face card-front">
          <img src="${img.b64}" alt="${img.nombre}" loading="lazy" />
          <div class="card-label">${img.nombre}</div>
        </div>
      </div>`;
    card.addEventListener('click', () => onCardClick(card, img, i));
    board.appendChild(card);
  });
}

function flipAllDown() {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped'));
}

// ════════════════════════════════
//  LÓGICA DE JUEGO
// ════════════════════════════════
function onCardClick(card, img, idx) {
  if (!gameState.running) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (gameState.flipped.length >= 2) return;

  card.classList.add('flipped');
  gameState.flipped.push({ card, img, idx });

  if (gameState.flipped.length === 2) {
    const [a, b] = gameState.flipped;
    if (a.img.b64 === b.img.b64 && a.idx !== b.idx) {
      // PAREJA
      setTimeout(() => {
        a.card.classList.replace('flipped', 'matched');
        b.card.classList.replace('flipped', 'matched');
        gameState.matched.add(a.img.url);
        gameState.flipped = [];
        updatePairsUI();
        if (gameState.matched.size === gameState.totalPairs) endGame(true);
      }, 400);
    } else {
      // NO PAREJA
      setTimeout(() => {
        a.card.classList.remove('flipped');
        b.card.classList.remove('flipped');
        gameState.flipped = [];
      }, 900);
    }
  }
}

// ════════════════════════════════
//  TIMER
// ════════════════════════════════
function startTimer() {
  gameState.interval = setInterval(() => {
    if (!gameState.running) return;
    gameState.timerSecs--;
    updateTimerUI();
    if (gameState.timerSecs <= 0) endGame(false);
  }, 1000);
}

function updateTimerUI() {
  const clock = document.getElementById('timerClock');
  const bar   = document.getElementById('timerBar');
  const secs  = gameState.timerSecs;
  const max   = gameState.timerMax;

  if (max === 0) {
    clock.className = 'timer-clock infinite';
    clock.textContent = '∞';
    bar.style.width = '100%';
    bar.className = 'timer-bar';
    return;
  }

  const m = String(Math.floor(secs/60)).padStart(2,'0');
  const s = String(secs % 60).padStart(2,'0');
  clock.textContent = `${m}:${s}`;

  const pct = (secs / max) * 100;
  bar.style.width = pct + '%';

  if (pct > 50)      { clock.className = 'timer-clock';        bar.className = 'timer-bar'; }
  else if (pct > 25) { clock.className = 'timer-clock';        bar.className = 'timer-bar mid'; }
  else               { clock.className = 'timer-clock urgent'; bar.className = 'timer-bar urgent'; }
}

function updatePairsUI() {
  document.getElementById('pairsFound').textContent = gameState.matched.size;
  document.getElementById('pairsTotal').textContent = gameState.totalPairs;
}

// ════════════════════════════════
//  FIN / STOP
// ════════════════════════════════
function endGame(won) {
  gameState.running = false;
  clearInterval(gameState.interval);
  clearInterval(gameState.previewInt);
  document.getElementById('previewBanner').classList.remove('visible');

  const overlay = document.getElementById('resultOverlay');
  const emoji   = document.getElementById('resultEmoji');
  const title   = document.getElementById('resultTitle');
  const msg     = document.getElementById('resultMsg');

  if (won) {
    emoji.textContent = '🎉';
    title.textContent = '¡Lo conseguiste!';
    msg.textContent   = `Encontraste las ${gameState.totalPairs} parejas. ¡Bien hecho, Erick!`;
  } else {
    emoji.textContent = '⏰';
    title.textContent = '¡Se acabó el tiempo!';
    const found = gameState.matched.size;
    msg.textContent = `Encontraste ${found} de ${gameState.totalPairs} parejas. ¡La próxima seguro que las encuentras todas!`;
  }
  overlay.classList.add('open');
}

window.stopGame = () => {
  if (!gameState.running && !gameState.preview) return;
  gameState.running = false;
  clearInterval(gameState.interval);
  clearInterval(gameState.previewInt);
  document.getElementById('previewBanner').classList.remove('visible');
  document.getElementById('timerDisplay').style.display = 'none';
  document.getElementById('board').innerHTML = `
    <div class="empty-state">
      <div class="big">🃏</div>
      <p>Pulsa <strong>JUGAR</strong> para comenzar<br>una nueva partida</p>
    </div>`;
  document.getElementById('headerTheme').textContent = '';
};

window.closeResult = () => {
  document.getElementById('resultOverlay').classList.remove('open');
  stopGame();
};

// ════════════════════════════════
//  TOAST
// ════════════════════════════════
window.showToast = (msg, type='') => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' '+type : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
};
</script>

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
